---
# Kubeadm cluster bootstrap. Inventory: kubeadm_cluster ⊃ kubeadm_control_plane + kubeadm_workers.
# Variables: kubernetes_version on [kubeadm_cluster:vars] — see roles/kubernetes/defaults/main.yml.

- name: Kubernetes — prepare all nodes
  hosts: kubeadm_cluster
  become: true
  any_errors_fatal: true
  roles:
    - base
    - kubernetes

- name: Kubernetes — initialize control plane
  hosts: kubeadm_control_plane
  become: true
  roles:
    - role: kubernetes
      tasks_from: control_plane.yml

- name: Kubernetes — join workers
  hosts: kubeadm_workers
  become: true
  any_errors_fatal: true
  roles:
    - role: kubernetes
      tasks_from: workers.yml

- name: Kubernetes — install CNI (Calico)
  hosts: kubeadm_control_plane
  become: true
  roles:
    - role: kubernetes
      tasks_from: cni.yml

- name: Kubernetes — verify API and nodes
  hosts: kubeadm_control_plane
  become: true
  roles:
    - role: kubernetes
      tasks_from: verify_cluster.yml
