---
# Do not commit real tokens. Prefer GITHUB_TOKEN in the environment or Ansible Vault for fluxcd_github_token.

# Optional Flux --components-extra= (lists; see roles/fluxcd/defaults/main.yml):
# fluxcd_image_automation_components:
#   - image-reflector-controller
#   - image-automation-controller
# fluxcd_components_extra:
#   - source-watcher
# Or INI-style string: fluxcd_components_extra=source-watcher,other-controller

fluxcd_github_bootstrap: true
fluxcd_github_owner: my-org
fluxcd_github_repository: fleet-infra

# Match this repo layout: bootstrap syncs Flux CRs under gitops/clusters/<env>/
fluxcd_github_path: gitops/clusters/dev
fluxcd_github_branch: main
fluxcd_github_personal: false
fluxcd_github_private: true
# Token auth: PAT must push for ImageUpdateAutomation (classic repo scope or fine-grained Contents read/write).
# Alternative: fluxcd_github_token_auth: false + fluxcd_github_read_write_key: true (SSH read-write deploy key).
fluxcd_github_token_auth: true
fluxcd_github_read_write_key: true
