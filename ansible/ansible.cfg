[defaults]
roles_path = ./roles
collections_paths = ./collections:~/.ansible/collections:/usr/share/ansible/collections
# Avoid interpreter discovery warnings; use distro default python3 (Debian/Ubuntu).
interpreter_python = /usr/bin/python3
# Do not prompt for SSH host keys (automation-friendly). For production, prefer verifying keys out-of-band.
host_key_checking = False
