---
# Kubernetes minor for pkgs.k8s.io (e.g. 1.31). Prefer setting kubernetes_version on [kubeadm_cluster:vars] in inventory (or group_vars/kubeadm_cluster.yml); this value is only a fallback if unset.
kubernetes_version: "1.31"
# pkgs.k8s.io (OBS) InRelease may require this signing key; keyserver fallback fixes NO_PUBKEY if Release.key alone is incomplete.
kubernetes_apt_isv_signing_key_id: "234654DA9A296436"
kubernetes_apt_enable_keyserver_fallback: true
# Seconds for get_url when fetching Release.key / apt-key.gpg (avoids indefinite hangs).
kubernetes_apt_key_download_timeout: 60
# Passed to gpg --keyserver-options for hkps recv-keys (avoids hanging on unreachable keyservers).
kubernetes_apt_gpg_keyserver_options: "timeout=20"

# Pod CIDR for kubeadm and Calico Installation ipPool (must match).
pod_network_cidr: "10.244.0.0/16"

# Calico (Tigera operator) — replaces Flannel
kubernetes_calico_version: "v3.28.2"
kubernetes_calico_tigera_operator_manifest_url: "https://raw.githubusercontent.com/projectcalico/calico/{{ kubernetes_calico_version }}/manifests/tigera-operator.yaml"
# kubectl wait timeouts (seconds)
kubernetes_calico_wait_operator_timeout: 300
kubernetes_calico_wait_calico_timeout: 600
kubernetes_calico_wait_calico_namespace_retries: 36
kubernetes_calico_wait_calico_namespace_delay: 10

# Containerd (CRI) for kubelet / kubeadm
containerd_systemd_cgroup: true
# Optional: set to your cluster’s pause image (e.g. registry.k8s.io/pause:3.10). Empty = leave containerd default.
containerd_sandbox_image: ""

control_plane_endpoint: ""

# Default kube-apiserver secure port (kubeadm); pre-check runs on control-plane nodes only.
kubernetes_apiserver_port: 6443
kubernetes_precheck_apiserver_port_free: true
# If /etc/kubernetes/admin.conf exists, skip 6443 check (apiserver already listening on re-runs).
kubernetes_precheck_apiserver_port_skip_when_bootstrapped: true

# Kubeadm preflight: unique product_uuid + MACs across kubeadm_cluster (requires role on all cluster nodes in the same play).
kubernetes_validate_unique_node_identity: true

# verify_cluster.yml — wait for API / nodes after CNI
kubernetes_verify_api_retries: 30
kubernetes_verify_api_delay: 5
kubernetes_verify_nodes_retries: 36
kubernetes_verify_nodes_delay: 10
