---
# Tigera operator: server-side apply avoids last-applied-configuration >256KiB on huge CRDs.
- name: Apply Tigera Calico operator manifest (server-side apply)
  kubernetes.core.k8s:
    kubeconfig: "{{ kubernetes_admin_kubeconfig }}"
    state: present
    src: "{{ kubernetes_calico_tigera_operator_manifest_url }}"
    apply: true
    server_side_apply:
      field_manager: "{{ kubernetes_calico_operator_field_manager }}"
      force_conflicts: true
  when: kubernetes_calico_operator_server_side_apply | bool

- name: Apply Tigera Calico operator manifest (client-side apply)
  kubernetes.core.k8s:
    kubeconfig: "{{ kubernetes_admin_kubeconfig }}"
    state: present
    src: "{{ kubernetes_calico_tigera_operator_manifest_url }}"
    apply: true
  when: not (kubernetes_calico_operator_server_side_apply | bool)

- name: Render Calico Installation / APIServer custom resources
  ansible.builtin.template:
    src: calico-custom-resources.yaml.j2
    dest: /tmp/calico-custom-resources.yaml
    mode: "0644"

- name: Apply Calico custom resources
  kubernetes.core.k8s:
    kubeconfig: "{{ kubernetes_admin_kubeconfig }}"
    state: present
    src: /tmp/calico-custom-resources.yaml
    apply: true

- name: Wait for Tigera operator Deployment Available
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubernetes_admin_kubeconfig }}"
    api_version: apps/v1
    kind: Deployment
    name: tigera-operator
    namespace: tigera-operator
    wait: true
    wait_sleep: 5
    wait_timeout: "{{ kubernetes_calico_wait_operator_timeout }}"
    wait_condition:
      type: Available
      status: "True"
  changed_when: false

- name: Wait until calico-system namespace exists
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubernetes_admin_kubeconfig }}"
    api_version: v1
    kind: Namespace
    name: calico-system
  register: kubernetes_calico_ns_info
  until: kubernetes_calico_ns_info.resources | length > 0
  retries: "{{ kubernetes_calico_wait_calico_namespace_retries }}"
  delay: "{{ kubernetes_calico_wait_calico_namespace_delay }}"
  changed_when: false

- name: Discover Calico pods in calico-system
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubernetes_admin_kubeconfig }}"
    api_version: v1
    kind: Pod
    namespace: calico-system
  register: kubernetes_calico_pods_list
  until: kubernetes_calico_pods_list.resources | length > 0
  retries: "{{ kubernetes_calico_wait_calico_namespace_retries }}"
  delay: "{{ kubernetes_calico_wait_calico_namespace_delay }}"
  changed_when: false

- name: Wait for each Calico pod Ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubernetes_admin_kubeconfig }}"
    api_version: v1
    kind: Pod
    name: "{{ item.metadata.name }}"
    namespace: calico-system
    wait: true
    wait_sleep: 5
    wait_timeout: "{{ kubernetes_calico_wait_calico_timeout }}"
    wait_condition:
      type: Ready
      status: "True"
  loop: "{{ kubernetes_calico_pods_list.resources }}"
  when: kubernetes_calico_pods_list.resources | length > 0
  changed_when: false
