---
# kubernetes.core.k8s / kubectl use admin kubeconfig on the control-plane node.
- name: Install Python Kubernetes client for kubernetes.core
  ansible.builtin.apt:
    name: python3-kubernetes
    state: present
    update_cache: false

# Tigera operator + Calico (replaces Flannel). pod_network_cidr must match kubeadm init.
- name: Apply Tigera Calico operator manifest
  ansible.builtin.command:
    argv:
      - kubectl
      - apply
      - -f
      - "{{ kubernetes_calico_tigera_operator_manifest_url }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: kubernetes_calico_operator_apply
  changed_when: >-
    'created' in kubernetes_calico_operator_apply.stdout | default('')
    or 'configured' in kubernetes_calico_operator_apply.stdout | default('')

- name: Render Calico Installation / APIServer custom resources
  ansible.builtin.template:
    src: calico-custom-resources.yaml.j2
    dest: /tmp/calico-custom-resources.yaml
    mode: "0644"

- name: Apply Calico custom resources
  ansible.builtin.command: kubectl apply -f /tmp/calico-custom-resources.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: kubernetes_calico_cr_apply
  changed_when: >-
    'created' in kubernetes_calico_cr_apply.stdout | default('')
    or 'configured' in kubernetes_calico_cr_apply.stdout | default('')

- name: Wait for Tigera operator deployment
  ansible.builtin.command:
    cmd: >-
      kubectl wait deployment tigera-operator -n tigera-operator
      --for=condition=Available=True --timeout={{ kubernetes_calico_wait_operator_timeout }}s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Wait until calico-system namespace exists
  ansible.builtin.command:
    argv:
      - kubectl
      - get
      - ns
      - calico-system
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: kubernetes_calico_ns_check
  until: kubernetes_calico_ns_check.rc == 0
  retries: "{{ kubernetes_calico_wait_calico_namespace_retries }}"
  delay: "{{ kubernetes_calico_wait_calico_namespace_delay }}"
  changed_when: false

- name: Wait for Calico pods in calico-system
  ansible.builtin.command:
    argv:
      - kubectl
      - wait
      - pods
      - -n
      - calico-system
      - --all
      - --for=condition=Ready
      - --timeout={{ kubernetes_calico_wait_calico_timeout }}s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false
