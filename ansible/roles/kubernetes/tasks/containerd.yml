---
# Containerd as the sole CRI for kubelet / kubeadm (dockershim removed in Kubernetes 1.24+).
- name: Install containerd and kubeadm port-forward dependency
  ansible.builtin.apt:
    name:
      - containerd
      - socat
    state: present
    update_cache: false

- name: Ensure containerd config directory exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate default containerd configuration
  ansible.builtin.shell: set -o pipefail && containerd config default > /etc/containerd/config.toml
  args:
    executable: /bin/bash
    creates: /etc/containerd/config.toml

- name: Use systemd cgroup driver in containerd (required for kubelet with systemd)
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup\s*=\s*false'
    replace: 'SystemdCgroup = true'
  when: containerd_systemd_cgroup | bool
  notify: Restart containerd

- name: Align containerd sandbox (pause) image with Kubernetes
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: '^(\s*sandbox_image\s*=\s*)".*"'
    replace: '\1"{{ containerd_sandbox_image }}"'
  when: containerd_sandbox_image | default('') | length > 0
  notify: Restart containerd

- name: Ensure containerd is enabled and running
  ansible.builtin.service:
    name: containerd
    state: started
    enabled: true

- name: Apply pending containerd handler (config changes need restart before kubelet uses CRI)
  ansible.builtin.meta: flush_handlers
