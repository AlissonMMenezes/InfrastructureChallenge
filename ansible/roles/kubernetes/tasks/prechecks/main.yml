---
- name: Validate unique node identity (MACs + product_uuid) across kubeadm_cluster
  ansible.builtin.include_tasks: prechecks/validate_cluster_node_identity.yml
  when: kubernetes_validate_unique_node_identity | bool

- name: Pre-check control-plane — API port must be free before Kubernetes install
  ansible.builtin.include_tasks: prechecks/control_plane_ports.yml
  when:
    - kubernetes_precheck_apiserver_port_free | bool
    - "'kubeadm_control_plane' in group_names"
