---
- name: Wait for Kubernetes API to accept kubectl (control plane ready)
  ansible.builtin.command: kubectl --kubeconfig=/etc/kubernetes/admin.conf get --raw=/readyz
  register: _k8s_readyz
  until: _k8s_readyz.rc == 0
  retries: "{{ kubernetes_verify_api_retries | int }}"
  delay: "{{ kubernetes_verify_api_delay | int }}"
  changed_when: false

- name: Wait for at least one node in kubectl output
  ansible.builtin.command: kubectl --kubeconfig=/etc/kubernetes/admin.conf get nodes --no-headers
  register: _k8s_nodes
  until: _k8s_nodes.rc == 0 and _k8s_nodes.stdout | default('') | trim | length > 0
  retries: "{{ kubernetes_verify_nodes_retries | int }}"
  delay: "{{ kubernetes_verify_nodes_delay | int }}"
  changed_when: false

- name: Show cluster nodes (playbook verification)
  ansible.builtin.command: kubectl --kubeconfig=/etc/kubernetes/admin.conf get nodes -o wide
  register: _k8s_nodes_wide
  changed_when: false

- name: Print kubectl get nodes
  ansible.builtin.debug:
    msg: "{{ _k8s_nodes_wide.stdout_lines }}"
