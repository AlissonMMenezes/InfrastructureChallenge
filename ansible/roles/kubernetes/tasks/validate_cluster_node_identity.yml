---
# Prepare phase (main.yml). Kubeadm preflight: unique SMBIOS product_uuid per node (/sys/class/dmi/id/product_uuid).
# Per-host read first; run_once checks run after every host has facts.
# Ref: https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/

- name: Read SMBIOS product UUID
  ansible.builtin.command:
    argv:
      - cat
      - /sys/class/dmi/id/product_uuid
  register: kubernetes_identity_uuid_cmd
  changed_when: false

- name: Record product_uuid for cluster uniqueness check
  ansible.builtin.set_fact:
    kubernetes_node_product_uuid: "{{ kubernetes_identity_uuid_cmd.stdout | trim | lower }}"

- name: Assert product_uuid is present and not a known invalid placeholder
  ansible.builtin.assert:
    that:
      - kubernetes_node_product_uuid | length > 0
      - kubernetes_node_product_uuid not in ['00000000-0000-0000-0000-000000000000', 'ffffffff-ffff-ffff-ffff-ffffffffffff']
    fail_msg: >-
      Invalid or missing product_uuid on {{ inventory_hostname }} (expected real SMBIOS UUID from /sys/class/dmi/id/product_uuid).
      Cloned VMs may need unique DMI values.

- name: Ensure every kubeadm_cluster host has product_uuid (run kubernetes role on all cluster nodes in this play)
  ansible.builtin.assert:
    that:
      - hostvars[item].kubernetes_node_product_uuid is defined
    fail_msg: >-
      Missing kubernetes_node_product_uuid for {{ item }} — include it in the play or run the kubernetes role on all kubeadm_cluster hosts together.
  loop: "{{ groups['kubeadm_cluster'] | default([]) }}"
  delegate_to: localhost
  run_once: true
  become: false

- name: Validate product_uuid is unique across kubeadm_cluster
  ansible.builtin.assert:
    that:
      - _cluster_uuids | length == (_cluster_uuids | unique | length)
    fail_msg: >-
      Duplicate SMBIOS product_uuid across nodes (must be unique per machine).
      UUIDs: {{ _cluster_uuids | to_json }}
  vars:
    _cluster_uuids: "{{ groups['kubeadm_cluster'] | default([]) | map('extract', hostvars, 'kubernetes_node_product_uuid') | list }}"
  delegate_to: localhost
  run_once: true
  become: false
