---
# Phase: verify (play: kubeadm_control_plane, tasks_from: verify_cluster.yml). Needs python3-kubernetes from cni.yml.
- name: Wait for Kubernetes API (Namespace default reachable)
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubernetes_admin_kubeconfig }}"
    api_version: v1
    kind: Namespace
    name: default
  register: kubernetes_verify_api
  until: kubernetes_verify_api.resources | default([]) | length > 0
  retries: "{{ kubernetes_verify_api_retries | int }}"
  delay: "{{ kubernetes_verify_api_delay | int }}"
  changed_when: false

- name: Wait for at least one Node to register
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubernetes_admin_kubeconfig }}"
    api_version: v1
    kind: Node
  register: kubernetes_verify_nodes
  until: kubernetes_verify_nodes.resources | default([]) | length > 0
  retries: "{{ kubernetes_verify_nodes_retries | int }}"
  delay: "{{ kubernetes_verify_nodes_delay | int }}"
  changed_when: false

- name: Show cluster nodes (playbook verification)
  ansible.builtin.debug:
    msg: >-
      node={{ item.metadata.name }}
      ready={{ item.status.conditions | default([]) | selectattr('type', 'equalto', 'Ready') | map(attribute='status') | first | default('Unknown') }}
      internal_ip={{ item.status.addresses | default([]) | selectattr('type', 'equalto', 'InternalIP') | map(attribute='address') | first | default('n/a') }}
      hostname={{ item.status.addresses | default([]) | selectattr('type', 'equalto', 'Hostname') | map(attribute='address') | first | default('n/a') }}
  loop: "{{ kubernetes_verify_nodes.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"
  changed_when: false
