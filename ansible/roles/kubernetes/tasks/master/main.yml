---
- name: Resolve control-plane advertise address
  ansible.builtin.set_fact:
    effective_control_plane_endpoint: "{{ control_plane_endpoint | default('', true) | trim | default(hostvars[groups['kubeadm_control_plane'][0]].ansible_host, true) }}"

- name: Initialize kubeadm control-plane
  ansible.builtin.command: >-
    kubeadm init
    --pod-network-cidr={{ pod_network_cidr }}
    --apiserver-advertise-address={{ effective_control_plane_endpoint }}
  args:
    creates: /etc/kubernetes/admin.conf

# Without ~/.kube/config, kubectl talks to http://localhost:8080 (connection refused). Applies to root and sudo users.
# Use ansible_facts[...] (no ansible_ prefix) — avoids INJECT_FACTS_AS_VARS deprecation.
- name: Create kube config directory for cluster admin
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.kube"
    state: directory
    mode: "0755"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_gid'] }}"

- name: Install admin kubeconfig for default kubectl
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "{{ ansible_facts['user_dir'] }}/.kube/config"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_gid'] }}"
    mode: "0600"
    remote_src: true

- name: Generate join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: kubeadm_join_cmd
  changed_when: false
  run_once: true

# Facts on delegate_to: localhost are not visible as hostvars['localhost'] unless localhost is in inventory.
# Store the join string on the control-plane host (same play); workers read hostvars[<first CP>].
- name: Publish join command for worker play
  ansible.builtin.set_fact:
    kubeadm_join_command: "{{ kubeadm_join_cmd.stdout }}"
  run_once: true
