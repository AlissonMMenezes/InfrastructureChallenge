---
# Phase: prepare (play: hosts kubeadm_cluster, role kubernetes, default tasks/main.yml).
# Other phases: control_plane.yml, workers.yml, cni.yml, verify_cluster.yml (see playbooks/bootstrap-k8s.yml).

- name: Validate unique SMBIOS product_uuid across cluster
  ansible.builtin.include_tasks: validate_cluster_node_identity.yml
  when: kubernetes_validate_unique_node_identity | bool

- name: Pre-check control-plane API port before install
  ansible.builtin.include_tasks: precheck_control_plane_ports.yml
  when:
    - kubernetes_precheck_apiserver_port_free | bool
    - "'kubeadm_control_plane' in group_names"

- name: Install and configure containerd
  ansible.builtin.include_tasks: containerd.yml

- name: Install Kubernetes packages and kubelet
  ansible.builtin.include_tasks: kubernetes_packages.yml
