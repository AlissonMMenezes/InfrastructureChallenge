---
# Phase: workers (play: kubeadm_workers, tasks_from: workers.yml).
# Join command comes from the first kubeadm_control_plane host (control_plane.yml).
- name: Validate join command is available
  vars:
    _k8s_cp: "{{ groups['kubeadm_control_plane'] | default([]) | first }}"
  ansible.builtin.assert:
    that:
      - _k8s_cp | length > 0
      - hostvars[_k8s_cp].kubeadm_join_command is defined
      - hostvars[_k8s_cp].kubeadm_join_command | length > 0
    fail_msg: "kubeadm_join_command is missing on {{ _k8s_cp }}. Run the control-plane play first (see playbooks/bootstrap-k8s.yml)."

- name: Join worker to cluster
  vars:
    _k8s_cp: "{{ groups['kubeadm_control_plane'] | default([]) | first }}"
  ansible.builtin.command: "{{ hostvars[_k8s_cp].kubeadm_join_command }}"
  args:
    creates: /etc/kubernetes/kubelet.conf

# Without ~/.kube/config, kubectl defaults to http://localhost:8080 (connection refused).
- name: Read admin kubeconfig from first control plane (for distributing to workers)
  when: kubernetes_copy_admin_kubeconfig_to_workers | bool
  vars:
    _k8s_cp: "{{ groups['kubeadm_control_plane'] | default([]) | first }}"
  ansible.builtin.slurp:
    src: "{{ kubernetes_admin_kubeconfig }}"
  delegate_to: "{{ _k8s_cp }}"
  register: kubernetes_worker_admin_kubeconfig_slurp

- name: Create kube config directory for kubectl on worker
  when: kubernetes_copy_admin_kubeconfig_to_workers | bool
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.kube"
    state: directory
    mode: "0755"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_gid'] }}"

- name: Install admin kubeconfig for kubectl on worker
  when: kubernetes_copy_admin_kubeconfig_to_workers | bool
  ansible.builtin.copy:
    dest: "{{ ansible_facts['user_dir'] }}/.kube/config"
    content: "{{ kubernetes_worker_admin_kubeconfig_slurp.content | b64decode }}"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_gid'] }}"
    mode: "0600"
