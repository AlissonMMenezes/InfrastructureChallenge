---
- name: Refresh apt caches (IPv4 / proxy / retries)
  ansible.builtin.import_tasks: apt_refresh.yml

- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  when: (ansible_facts['swaptotal_mb'] | default(0)) | int > 0
  changed_when: (ansible_facts['swaptotal_mb'] | default(0)) | int > 0

- name: Disable swap in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: Install base system packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg
      - gnupg
      - software-properties-common
      - unzip
    state: present
    update_cache: false

- name: Load required kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    mode: "0644"
    content: |
      overlay
      br_netfilter

- name: Configure sysctl parameters for Kubernetes networking
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-kubernetes-cri.conf
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1

- name: Apply sysctl configuration
  ansible.builtin.command: sysctl --system
  changed_when: false
