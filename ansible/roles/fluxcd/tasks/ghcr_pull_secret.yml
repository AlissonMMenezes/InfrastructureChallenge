---
# Docker-registry secrets for ghcr.io using the same PAT as Flux Git (GITHUB_TOKEN / fluxcd_github_token).
# Used by image-reflector-controller (ImageRepository) and workload imagePullSecrets (demo-api).
- name: Resolve GitHub token for GHCR (variable or controller environment)
  ansible.builtin.set_fact:
    fluxcd_github_token_for_registry: >-
      {{
        (fluxcd_github_token | default('') | trim)
        if (fluxcd_github_token | default('') | trim | length > 0)
        else (lookup('ansible.builtin.env', 'GITHUB_TOKEN', default='') | trim)
      }}

- name: Resolve GHCR docker username (registry login name; often GitHub username / owner)
  ansible.builtin.set_fact:
    fluxcd_ghcr_docker_username_effective: >-
      {{
        (fluxcd_ghcr_docker_username | default('') | trim)
        if (fluxcd_ghcr_docker_username | default('') | trim | length > 0)
        else (fluxcd_github_owner | default('') | trim)
      }}

- name: Assert GHCR secret prerequisites
  ansible.builtin.assert:
    that:
      - fluxcd_github_token_for_registry | length > 0
      - fluxcd_ghcr_docker_username_effective | length > 0
    fail_msg: >-
      fluxcd_ghcr_pull_secret is true but no token or username: set fluxcd_github_token or export GITHUB_TOKEN,
      and set fluxcd_github_owner (bootstrap) or fluxcd_ghcr_docker_username. PAT needs read:packages for private GHCR images.

- name: Build GHCR .dockerconfigjson
  ansible.builtin.set_fact:
    fluxcd_ghcr_dockerconfigjson: >-
      {{
        {
          'auths': {
            fluxcd_ghcr_server: {
              'auth': (fluxcd_ghcr_docker_username_effective ~ ':' ~ fluxcd_github_token_for_registry) | b64encode
            }
          }
        } | to_json
      }}
  no_log: true

- name: Ensure GHCR pull secret in flux-system (ImageRepository / image-reflector)
  kubernetes.core.k8s:
    kubeconfig: "{{ fluxcd_kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ fluxcd_ghcr_secret_name }}"
        namespace: flux-system
      type: kubernetes.io/dockerconfigjson
      stringData:
        .dockerconfigjson: "{{ fluxcd_ghcr_dockerconfigjson }}"
  no_log: true

- name: Ensure app-dev namespace exists (for workload pull secret)
  kubernetes.core.k8s:
    kubeconfig: "{{ fluxcd_kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ fluxcd_ghcr_app_namespace }}"
  when: fluxcd_ghcr_secret_in_app_namespace | bool

- name: Ensure GHCR pull secret in app namespace (Deployment imagePullSecrets)
  kubernetes.core.k8s:
    kubeconfig: "{{ fluxcd_kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ fluxcd_ghcr_secret_name }}"
        namespace: "{{ fluxcd_ghcr_app_namespace }}"
      type: kubernetes.io/dockerconfigjson
      stringData:
        .dockerconfigjson: "{{ fluxcd_ghcr_dockerconfigjson }}"
  when: fluxcd_ghcr_secret_in_app_namespace | bool
  no_log: true
