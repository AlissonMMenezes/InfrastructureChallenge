---
# Flux v2 CLI release (https://github.com/fluxcd/flux2/releases) — no leading "v" in value.
fluxcd_version: "2.4.0"

# Cluster admin kubeconfig on the control-plane node (same as kubeadm).
fluxcd_kubeconfig: /etc/kubernetes/admin.conf

# Install flux binary to this path (from GitHub release tarball).
fluxcd_cli_path: /usr/local/bin/flux

# When true, merge fluxcd_image_automation_components into --components-extra= (ImageRepository / ImagePolicy / ImageUpdateAutomation).
fluxcd_image_automation: true

# Controller names added when fluxcd_image_automation is true. Override or extend this list (e.g. add another optional controller name).
fluxcd_image_automation_components:
  - image-reflector-controller
  - image-automation-controller

# Additional controllers for flux install / flux bootstrap --components-extra= (merged with image automation list above, deduped).
# Prefer a YAML list, e.g. [source-watcher]. A comma-separated string is also accepted for inventory convenience.
fluxcd_components_extra: []

# Pass --network-policy to flux install
fluxcd_network_policy: false

# Run flux install (set false to only install CLI). Ignored when fluxcd_github_bootstrap is true.
fluxcd_cluster_install: true

# Run flux check after install / GitHub bootstrap
fluxcd_verify: true

# --- GitHub bootstrap (flux bootstrap github) ---
# When true, runs flux bootstrap github instead of flux install (deploys Flux + GitRepository/Kustomization sync).
# Requires GITHUB_TOKEN on the Ansible controller (recommended) or fluxcd_github_token (Vault / -e). See docs/ansible.md in the repo.
fluxcd_github_bootstrap: false

fluxcd_github_owner: ""
fluxcd_github_repository: ""
# Path in the repo for this cluster (Flux sync root). This monorepo uses gitops/clusters/<env>/.
fluxcd_github_path: gitops/clusters/dev
fluxcd_github_branch: main

# User account repo (--personal); omit for GitHub organization.
fluxcd_github_personal: false

# Repository visibility (flux defaults to private).
fluxcd_github_private: true

# Use PAT from GITHUB_TOKEN / fluxcd_github_token instead of SSH deploy key (typical for automation).
fluxcd_github_token_auth: true

# SSH / deploy-key bootstrap only: pass --read-write-key so the GitHub deploy key can push (ImageUpdateAutomation).
# Ignored when fluxcd_github_token_auth is true — then GITHUB_TOKEN must allow pushes (classic: repo; fine-grained: Contents read/write).
fluxcd_github_read_write_key: true

# GitHub Enterprise hostname (leave empty for github.com).
fluxcd_github_hostname: ""

# Pass --reconcile when the repo already exists and options should be reconciled.
fluxcd_github_reconcile: false

# Optional extra argv for flux bootstrap github (list of strings), e.g. ['--timeout', '10m'].
fluxcd_github_bootstrap_extra_args: []

# When true, hide flux bootstrap stdout/stderr in Ansible (harder to debug). Default false so failures show real errors.
# GITHUB_TOKEN is only in the task environment; flux output rarely contains it — set true in shared CI logs if you prefer.
fluxcd_github_bootstrap_no_log: false

# Prefer env GITHUB_TOKEN on the controller; set this when not using the environment (use Vault).
fluxcd_github_token: ""

# --- GHCR (GitHub Packages) pull secrets (same PAT as above; needs read:packages for private images) ---
# Creates kubernetes.io/dockerconfigjson Secret fluxcd_ghcr_secret_name in flux-system (and optionally app-dev)
# after install/bootstrap so image-reflector and workloads can pull ghcr.io/<owner>/...
fluxcd_ghcr_pull_secret: true
fluxcd_ghcr_secret_name: ghcr-flux-credentials
fluxcd_ghcr_server: ghcr.io
# If empty, uses fluxcd_github_owner. Set explicitly when not using GitHub bootstrap (e.g. flux install only).
fluxcd_ghcr_docker_username: ""
fluxcd_ghcr_app_namespace: app-dev
fluxcd_ghcr_secret_in_app_namespace: true
