# Terraform outputs: use jump public IPv4 for [bastion], cluster nodes use private IPs on cluster subnet.
# Replace placeholder IPs after apply.

[bastion]
jump ansible_host=78.46.243.66 ansible_user=root

[kubeadm_control_plane]
master ansible_host=10.50.2.10 ansible_user=root ansible_ssh_common_args='-o ProxyJump=root@78.46.243.66'

[kubeadm_workers]
worker ansible_host=10.50.2.11 ansible_user=root ansible_ssh_common_args='-o ProxyJump=root@78.46.243.66'
#worker ansible_host=10.50.2.12 ansible_user=root ansible_ssh_common_args='-o ProxyJump=root@78.46.243.66'

[kubeadm_cluster:children]
kubeadm_control_plane
kubeadm_workers

# Kubernetes minor for pkgs.k8s.io (e.g. 1.31 → .../v1.31/deb/). Must match a published repo.
[kubeadm_cluster:vars]
kubernetes_version=1.35

# Explicit Python for all hosts (stops discovery warnings); matches Debian/Ubuntu python3 symlink.
[all:vars]
ansible_python_interpreter=/usr/bin/python3
