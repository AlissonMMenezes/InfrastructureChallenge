name: Build and Publish Demo App Image

on:
  push:
    branches:
      - main
    paths:
      - "demo-app/**"
      - ".github/workflows/demo-app-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        run: |
          echo "image=ghcr.io/${{ github.repository_owner }}/demo-app" >> "$GITHUB_OUTPUT"
          echo "semver_tag=0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push demo-app image
        uses: docker/build-push-action@v6
        with:
          context: ./demo-app
          file: ./demo-app/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.semver_tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image }}:latest
