apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
spec:
  interval: 5m
  chart:
    spec:
      chart:  cloudnative-pg
      version: "0.27.1"  # Use the latest stable version
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: default
  values:
    # Operator ConfigMap: https://cloudnative-pg.io/documentation/current/operator_conf/
    config:
      data:
        # Default operand image when a Cluster omits spec.imageName; keep in sync with upgrades.
        POSTGRES_IMAGE_NAME: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie
        # Spread rollouts when the operator reconciles many clusters/instances (optional tuning).
        CLUSTERS_ROLLOUT_DELAY: "0"
        INSTANCES_ROLLOUT_DELAY: "0"
  install:
    createNamespace: true