# OpenBao on Kubernetes via the official Helm chart (server StatefulSet + optional injector).
# Docs: https://openbao.org/docs/platform/k8s/helm/
# After install: initialize and unseal the server (not automated here); tune HA/storage for production.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: openbao-system
spec:
  interval: 10m
  chart:
    spec:
      chart: openbao
      version: "0.26.2"
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: default
  install:
    createNamespace: true
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    crds: Skip
    remediation:
      remediateLastFailure: true
  values:
    global:
      enabled: true
      tlsDisable: true
    injector:
      enabled: true
    server:
      enabled: true
      standalone:
        enabled: true
      ha:
        enabled: false
      dataStorage:
        enabled: true
        size: 10Gi
      resources:
        requests:
          memory: 256Mi
          cpu: 250m
        limits:
          memory: 512Mi
          cpu: "1"
