# OpenBao on Kubernetes via the official Helm chart (server StatefulSet + optional injector).
# Docs: https://openbao.org/docs/platform/k8s/helm/
# After install: initialize and unseal the server (not automated here); tune HA/storage for production.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: openbao-system
spec:
  interval: 10m
  chart:
    spec:
      chart: openbao
      version: "0.26.2"
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: default
  install:
    createNamespace: true
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    crds: Skip
    remediation:
      remediateLastFailure: true
  values:
    global:
      enabled: true
      tlsDisable: true
      # HTTP(S) address of the OpenBao API for injector / CSI when the server is *not* deployed by this chart.
      # If non-empty, the chart uses "external" mode and does NOT create the StatefulSet — use only with server.enabled: false
      # and a reachable OpenBao elsewhere. For the default in-cluster server + Ingress, leave empty and set api_addr in standalone.config.
      externalBaoAddr: ""
    injector:
      enabled: true
    server:
      enabled: true
      standalone:
        enabled: true
        # Advertises the public URL (TLS terminated at Traefik) for redirects and CLI; in-cluster clients may still use the Service DNS.
        config: |
          ui = true
          api_addr = "https://openbao.alissonmachado.com.br"
          listener "tcp" {
            tls_disable = 1
            address = "[::]:8200"
            cluster_address = "[::]:8201"
          }
          storage "file" {
            path = "/openbao/data"
          }
      ha:
        enabled: false
      dataStorage:
        enabled: true
        size: 10Gi
      resources:
        requests:
          memory: 256Mi
          cpu: 250m
        limits:
          memory: 512Mi
          cpu: "1"
