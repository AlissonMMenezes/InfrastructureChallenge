# OpenBao on Kubernetes via the official Helm chart (server StatefulSet + optional injector).
# Docs: https://openbao.org/docs/platform/k8s/helm/
# First-time init + storing root token / unseal keys: Job openbao-init-store-keys (gitops/infrastructure/openbao-kubernetes-auth/).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: openbao-system
spec:
  interval: 10m
  chart:
    spec:
      chart: openbao
      version: "0.26.2"
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: default
  install:
    createNamespace: true
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    crds: Skip
    remediation:
      remediateLastFailure: true
  values:
    global:
      enabled: true
      tlsDisable: true
      # HTTP(S) address of the OpenBao API for injector / CSI when the server is *not* deployed by this chart.
      # If non-empty, the chart uses "external" mode and does NOT create the StatefulSet — use only with server.enabled: false
      # and a reachable OpenBao elsewhere. For the default in-cluster server + Ingress, leave empty and set api_addr in standalone.config.
      externalBaoAddr: ""
    injector:
      enabled: true
    server:
      enabled: true
      # Used by auth/kubernetes (TokenReview + bootstrap script kubernetes_host URL). Pods usually get these from the cluster; set explicitly for consistent in-cluster API access.
      extraEnvironmentVars:
        KUBERNETES_SERVICE_HOST: kubernetes.default.svc
        KUBERNETES_SERVICE_PORT: "443"
      # Binds system:auth-delegator to the server ServiceAccount (required for auth/kubernetes TokenReview).
      # Values path follows chart layout (under OpenShift route block). https://openbao.org/docs/auth/kubernetes
      route:
        authDelegator:
          enabled: true
      standalone:
        enabled: true
        # Advertises the public URL (TLS terminated at Traefik) for redirects and CLI; in-cluster clients may still use the Service DNS.
        # Keep host + scheme aligned with the browser URL and Ingress host, or the UI can misbehave (e.g. token / API calls).
        config: |
          ui = true
          api_addr = "https://openbao.alissonmachado.com.br"
          listener "tcp" {
            tls_disable = 1
            address = "[::]:8200"
            cluster_address = "[::]:8201"
            telemetry {
              unauthenticated_metrics_access = "true"
            }
          }
          storage "file" {
            path = "/openbao/data"
          }

          # Mount Kubernetes auth at auth/kubernetes/ (same as `bao auth enable kubernetes`). Bootstrap job skips enable if already present.
          auth "kubernetes" {
            path = "kubernetes"
          }

          telemetry {
            prometheus_retention_time = "30s"
            disable_hostname = true
          }
      ha:
        enabled: false
      dataStorage:
        enabled: true
        size: 10Gi
        # Requires a default StorageClass or gitops/storage (local-path-provisioner) applied before this release.
        storageClass: local-path
      # Default exec probe runs `bao status` → fails while sealed or not yet initialized, so Helm/Flux never
      # sees the StatefulSet as Ready. Use /v1/sys/health with custom codes (OpenBao API) so “process up” passes;
      # you still must init/unseal for a working API. See https://openbao.org/api-docs/system/health/
      readinessProbe:
        enabled: true
        path: "/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"
        port: 8200
      resources:
        requests:
          memory: 256Mi
          cpu: 250m
        limits:
          memory: 512Mi
          cpu: "1"
    # Prometheus Operator ServiceMonitor — requires kube-prometheus-stack (operators) applied before this release.
    # https://openbao.org/docs/configuration/telemetry/
    serverTelemetry:
      serviceMonitor:
        enabled: true
