# cert-manager — ACME / Let's Encrypt (and other issuers) for Kubernetes TLS.
# After install, add a ClusterIssuer or Issuer (e.g. letsencrypt-prod) referencing an ACME server.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 10m
  chart:
    spec:
      chart: cert-manager
      version: "v1.20.0"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: default
  install:
    createNamespace: true
    # CRDs are installed by the chart (see values.crds); avoid Flux double-applying chart CRDs.
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    crds: Skip
    remediation:
      remediateLastFailure: true
  values:
    crds:
      enabled: true
      keep: true
    global:
      leaderElection:
        namespace: cert-manager
