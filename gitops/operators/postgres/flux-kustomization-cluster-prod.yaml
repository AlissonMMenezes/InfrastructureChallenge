# Flux: reconcile CNPG Cluster + backups + monitors for prod
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgres-cluster-prod
  namespace: flux-system
spec:
  interval: 10m
  path: ./gitops/operators/postgres/manifests/prod
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cnpg-operator
