# kube-prometheus-stack: Prometheus Operator + Prometheus + Alertmanager + Grafana +
# kube-state-metrics + prometheus-node-exporter + default ServiceMonitors/PrometheusRules for Kubernetes.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "82.13.2"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: default
  install:
    createNamespace: true
    # Required: chart CRDs (Alertmanager, Prometheus, ServiceMonitor, …) must exist before other resources.
    # Skip leaves monitoring.coreos.com types missing → "no matches for kind Alertmanager".
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      remediateLastFailure: true
  values:
    # Keep CRDs subchart enabled; Flux Create/CreateReplace applies chart-bundled CRDs reliably.
    crds:
      enabled: true

    # Scrape any ServiceMonitor/PrometheusRule in the cluster (not only those with the release label).
    prometheus:
      prometheusSpec:
        retention: 7d
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeInterval: 30s
        resources:
          requests:
            cpu: 200m
            memory: 512Mi

    alertmanager:
      enabled: true
      alertmanagerSpec:
        replicas: 1
        resources:
          requests:
            cpu: 50m
            memory: 128Mi

    grafana:
      enabled: true
      persistence:
        enabled: false
      adminUser: admin
      # Password is stored in secret created by the chart (not committed here).
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - grafana.alissonmachado.com.br
        path: /
        pathType: Prefix
        tls:
          - secretName: grafana-tls
            hosts:
              - grafana.alissonmachado.com.br
      grafana.ini:
        server:
          root_url: https://grafana.alissonmachado.com.br/

    kubeStateMetrics:
      enabled: true

    nodeExporter:
      enabled: true

    prometheusOperator:
      enabled: true
