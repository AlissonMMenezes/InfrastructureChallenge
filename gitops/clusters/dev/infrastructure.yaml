---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./gitops/infrastructure
  prune: true
  dependsOn:
    - name: operators
  retryInterval: 2m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 15m0s
  wait: true
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: dev-postgres
      namespace: postgres
    - apiVersion: apps/v1
      kind: Deployment
      name: traefik
      namespace: traefik-system
