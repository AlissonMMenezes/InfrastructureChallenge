# Dev cluster: Flux GitOps entry (use with `flux bootstrap github --path=./gitops/clusters/dev`).
# Expects GitRepository `flux-system` in namespace `flux-system` (created by bootstrap).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../operators/postgres/helm-repository-cnpg.yaml
  - ../../operators/postgres/helm-release-cnpg.yaml
  - ../../operators/postgres/flux-kustomization-cluster-dev.yaml
  - ../../applications/demo-app/flux-kustomization-dev.yaml
