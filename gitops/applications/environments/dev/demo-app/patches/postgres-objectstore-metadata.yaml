# JSON6902: bind ObjectStore to demo-app cluster name + namespace + S3 prefix.
- op: replace
  path: /metadata/name
  value: demo-app-db-store
- op: replace
  path: /metadata/namespace
  value: app-dev
- op: replace
  path: /spec/configuration/destinationPath
  value: s3://dev-test-cnpg-backups/demo-app-db/
