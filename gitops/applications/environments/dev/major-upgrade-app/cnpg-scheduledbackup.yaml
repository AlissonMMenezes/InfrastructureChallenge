# Plugin-based backup; cluster and credentials Secret live in major-upgrade-app.
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: demo-app-db-daily
  namespace: major-upgrade-app
spec:
  schedule: "0 */5 * * * *"
  backupOwnerReference: self
  cluster:
    name: demo-app-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
