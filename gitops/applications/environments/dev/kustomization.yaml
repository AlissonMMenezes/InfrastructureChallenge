apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# major-upgrade-app: workloads in ns major-upgrade-app; Image* CRs in flux-system (see major-upgrade-flux-image-automation.yaml).
# demo-app overlay: swap resources to demo-app/ + demo-app/image-automation.yaml (only one overlay — duplicate ImageRepository names).
resources:
  - major-upgrade-app/
  - demo-app/
