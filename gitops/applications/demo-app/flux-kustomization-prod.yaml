# Flux: demo application (prod)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: demo-app-prod
  namespace: flux-system
spec:
  interval: 10m
  path: ./gitops/applications/demo-app/manifests/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
