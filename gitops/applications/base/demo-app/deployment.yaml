apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api
  namespace: app-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-api
  template:
    metadata:
      labels:
        app: demo-api
    spec:
      serviceAccountName: demo-api
      containers:
        - name: demo-api
          image: ghcr.io/alissonmachado/demo-app:0.1.0
          envFrom:
            - secretRef:
                name: demo-app-postgres
          ports:
            - containerPort: 8080
