# Pushes CloudNativePG bootstrap Secret into OpenBao KV v2 at secret/demo-app/postgres (no custom scripts).
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: cnpg-demo-app-to-openbao
  namespace: app-dev
spec:
  refreshInterval: 2m
  updatePolicy: Replace
  deletionPolicy: None
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: demo-app-db-app
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: demo-app/postgres
          property: username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: demo-app/postgres
          property: password
    - match:
        secretKey: hostname
        remoteRef:
          remoteKey: demo-app/postgres
          property: host
    - match:
        secretKey: port
        remoteRef:
          remoteKey: demo-app/postgres
          property: port
    - match:
        secretKey: dbname
        remoteRef:
          remoteKey: demo-app/postgres
          property: dbname
    - match:
        secretKey: uri
        remoteRef:
          remoteKey: demo-app/postgres
          property: connection_string
