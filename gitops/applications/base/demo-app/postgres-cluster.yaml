# Dedicated PostgreSQL for demo-api (CloudNativePG). RW service: demo-app-db-rw.app-dev.svc.cluster.local
# CNPG creates Secret demo-app-db-app (app user) with uri, username, password, etc. — demo-api uses key uri.
# S3 backup: create Secret cnpg-s3-credentials in app-dev (see gitops/infrastructure/postgres/BACKUP.md).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: demo-app-db
  namespace: app-dev
  labels:
    app.kubernetes.io/name: demo-app-db
spec:
  instances: 1
  primaryUpdateStrategy: unsupervised

  monitoring:
    enablePodMonitor: true

  storage:
    size: 5Gi

  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://dev-test-cnpg-backups/demo-app-db/
      endpointURL: https://fsn1.your-objectstorage.com
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
      data:
        compression: gzip

  bootstrap:
    initdb:
      database: app
      owner: app

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"
