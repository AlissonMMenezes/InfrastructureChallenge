# Dedicated PostgreSQL for demo-api (CloudNativePG). RW service: demo-app-db-rw.app-dev.svc.cluster.local
# CNPG creates Secret demo-app-db-app (app user) with uri, username, password, etc. — demo-api uses key uri.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: demo-app-db
  namespace: app-dev
  labels:
    app.kubernetes.io/name: demo-app-db
spec:
  instances: 1
  primaryUpdateStrategy: unsupervised

  monitoring:
    enablePodMonitor: true

  storage:
    size: 5Gi

  bootstrap:
    initdb:
      database: app
      owner: app

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"
