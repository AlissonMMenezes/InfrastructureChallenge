# Allow Prometheus (monitoring namespace) to scrape demo-api :8080 for ServiceMonitor metrics.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: app-dev
spec:
  podSelector:
    matchLabels:
      app: demo-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
