# OpenBao is Vault HTTP–compatible; ESO uses the HashiCorp Vault provider.
# Kubernetes auth (mount kubernetes, role external-secrets) is applied by
# gitops/infrastructure/openbao-kubernetes-auth/ after you create Secret openbao-bootstrap (see docs/gitops.md).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      server: "http://openbao.openbao-system.svc.cluster.local:8200"
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
