# OpenBao is Vault HTTP–compatible; ESO uses the HashiCorp Vault provider.
# Configure OpenBao: enable kubernetes auth, role "external-secrets" bound to
# ServiceAccount external-secrets in namespace external-secrets, policy read+write on secret/data/demo-app/postgres.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      server: "http://openbao.openbao-system.svc.cluster.local:8200"
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
