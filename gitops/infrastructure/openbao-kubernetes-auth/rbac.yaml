# Allow the OpenBao server ServiceAccount (Helm release name "openbao") to read the one-time bootstrap Secret.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openbao-bootstrap-secret-reader
  namespace: openbao-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["openbao-bootstrap"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openbao-bootstrap-secret-reader
  namespace: openbao-system
subjects:
  - kind: ServiceAccount
    name: openbao
    namespace: openbao-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openbao-bootstrap-secret-reader
