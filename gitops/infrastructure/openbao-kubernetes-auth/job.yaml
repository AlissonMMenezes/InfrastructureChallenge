# One-shot bootstrap: enables auth/kubernetes, writes config (TokenReview via OpenBao SA token), policy, roles default + external-secrets.
# Requires: OpenBao initialized + unsealed; root token via BAO_ROOT_TOKEN (Secret ref below) and/or Secret openbao-bootstrap key root-token mounted at /bootstrap/root-token (not stored in Git).
# Same idea as `bao login $BAO_ROOT_TOKEN` + `bao write auth/kubernetes/config` + role/default — we keep full config (CA + token_reviewer_jwt) so TokenReview works in real clusters.
# After changing the script, delete the Job so Flux can recreate it (Job spec.template is immutable).
apiVersion: batch/v1
kind: Job
metadata:
  name: openbao-kubernetes-auth-bootstrap
  namespace: openbao-system
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  activeDeadlineSeconds: 900
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: openbao
      containers:
        - name: bootstrap
          image: quay.io/openbao/openbao:2.5.2
          imagePullPolicy: IfNotPresent
          env:
            - name: BAO_ADDR
              value: http://openbao.openbao-system.svc.cluster.local:8200
            - name: TOKEN_FILE
              value: /bootstrap/root-token
            # Equivalent to examples that use: env BAO_ROOT_TOKEN + `bao login` (we export BAO_TOKEN in the script).
            - name: BAO_ROOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openbao-bootstrap
                  key: root-token
                  optional: true
            # Match server extraEnvironmentVars — value passed to `bao write auth/kubernetes/config kubernetes_host=...`
            - name: KUBERNETES_SERVICE_HOST
              value: kubernetes.default.svc
            - name: KUBERNETES_SERVICE_PORT
              value: "443"
          command: ["/bin/sh", "/scripts/bootstrap.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: root-token
              mountPath: /bootstrap
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: openbao-kubernetes-auth-bootstrap
            defaultMode: 0755
        - name: root-token
          secret:
            secretName: openbao-bootstrap
            optional: true
