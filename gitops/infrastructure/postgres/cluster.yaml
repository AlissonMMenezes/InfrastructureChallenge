# CloudNative-PG Cluster: 3-instance PostgreSQL (HA + quorum).
# Requires the cloudnative-pg operator (HelmRelease in gitops/operators/cloudnative-pg).
# S3 backup: create Secret cnpg-s3-credentials in namespace postgres (see BACKUP.md).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: dev-postgres
  namespace: postgres
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database
spec:
  instances: 3
  primaryUpdateStrategy: unsupervised

  # PodMonitors for cnpg metrics (:9187) — picked up by kube-prometheus-stack Prometheus.
  monitoring:
    enablePodMonitor: true

  storage:
    size: 10Gi

  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://dev-test-cnpg-backups/dev-postgres/
      endpointURL: https://fsn1.your-objectstorage.com
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
      data:
        compression: gzip

  bootstrap:
    initdb:
      database: app
      owner: app
      # Credentials for `app` are created in secret `dev-postgres-app`

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      log_min_duration_statement: "1000ms"
