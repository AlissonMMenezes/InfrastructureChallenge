# Traefik ingress controller — aligns NodePorts with Terraform workers LB (80→30080, 443→30443).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik-system
spec:
  interval: 10m
  chart:
    spec:
      chart: traefik
      version: "39.0.6"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: default
  install:
    createNamespace: true
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      remediateLastFailure: true
  values:
    deployment:
      replicas: 1
    ingressClass:
      enabled: true
      isDefaultClass: true
    providers:
      kubernetesIngress:
        enabled: true
      kubernetesCRD:
        enabled: true
    # Chart uses service.type (not service.spec.type); wrong nesting breaks rendering / post-render YAML.
    service:
      type: NodePort
    ports:
      web:
        nodePort: 30080
      websecure:
        nodePort: 30443
