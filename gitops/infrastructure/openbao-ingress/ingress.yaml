# Public UI/API for OpenBao (TLS at Traefik; server runs with tlsDisable). Lock down in production (IP allowlist, SSO, etc.).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openbao
  namespace: openbao-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - openbao.alissonmachado.com.br
      secretName: openbao-tls
  rules:
    - host: openbao.alissonmachado.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openbao
                port:
                  number: 8200
